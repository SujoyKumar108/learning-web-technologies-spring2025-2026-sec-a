<!DOCTYPE html>

<head>
    <title>Person Profile Form</title>
</head>

<body>
    <form>
        <table width="50%" border="1" cellspacing="0" cellpadding="9" align="center">
            <tr>
                <td colspan="3" align="center">
                    <h2>PERSON PROFILE</h2>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="name">Name</label>
                </td>
                <td>
                    <input type="text" name="name" size="20" />
                </td>
                <td>

                </td>
            </tr>
            <tr>
                <td>
                    <label for="email">Email</label>
                </td>
                <td>
                    <input type="email" name="email" size="20" />
                </td>
                <td>

                </td>
            </tr>
            <tr>
                <td>
                    <label for="gender">Gender</label>
                </td>
                <td>
                    <input type="radio" name="gender" value="male" />Male
                    <input type="radio" name="gender" value="female" />Female
                    <input type="radio" name="gender" value="other" />Other
                </td>
                <td>

                </td>
            </tr>
            <tr>
                <td>
                    <label for="dob">Date of Birth</label>
                </td>
                <td>
                    <input type="text" size="1">/
                    <input type="text" size="1">/
                    <input type="text" size="2">(dd/mm/yyyy)
                </td>
                <td>

                </td>
            </tr>
            <tr>
                <td>
                    <label for="blood">Blood Group</label>
                </td>
                <td>
                    <select name="blood">
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                    </select>
                </td>
                <td>

                </td>
            </tr>
            <tr>
                <td>
                    <label for="degree">Degree</label>
                </td>
                <td>
                    <input type="checkbox" value="SSC" />SSC
                    <input type="checkbox" value="HSC" />HSC
                    <input type="checkbox" value="BSc" />BSc.
                    <input type="checkbox" value="MSc" />MSc.
                </td>
                <td>

                </td>
            </tr>
            <tr>
                <td>
                    <label for="picture">Photo</label>
                </td>
                <td colspan="2">
                    <input type="file" name="pic">
                </td>
            </tr>
            <tr>
                <tr>
                <td colspan="3">
                    <br>
                </td>
                
            </tr>
            <tr>
                
                <td colspan="3" align="right">
                    <button>Submit</button>
                    <button>Reset</button>
                </td>
            </tr>

        </table>
    </form>
</body>

</html>
